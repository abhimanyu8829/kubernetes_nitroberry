apiVersion: apps/v1
kind: Deployment
metadata:
  name: cockpit-api
  namespace: cockpit-namespace
  labels:
    app: cockpit-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cockpit-api
  template:
    metadata:
      labels:
        app: cockpit-api
    spec:
      containers:
      - name: api
        image: 798701233691.dkr.ecr.ap-south-1.amazonaws.com/nitroberry/cockpit-api:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: cockpit-api-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: cockpit-api-secrets
              key: database-url
      - name: worker
        image: 798701233691.dkr.ecr.ap-south-1.amazonaws.com/nitroberry/cockpit-worker:latest
        envFrom:
        - configMapRef:
            name: cockpit-api-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: cockpit-api-secrets
              key: database-url
---
apiVersion: v1
kind: Service
metadata:
  name: cockpit-api-service
  namespace: cockpit-namespace
spec:
  selector:
    app: cockpit-api
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cockpit-api-hpa
  namespace: cockpit-namespace
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cockpit-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cockpit-api-websecure
  namespace: cockpit-namespace
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`cockpit.nitroberry.com`)
      kind: Rule
      services:
        - name: cockpit-api-service
          port: 8080
      middlewares:
        - name: rate-limit
          namespace: traefik-ingress
        - name: security-headers
          namespace: traefik-ingress
  tls:
    certResolver: myresolver
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cockpit-api-policy
  namespace: cockpit-namespace
spec:
  podSelector:
    matchLabels:
      app: cockpit-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik-ingress
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: database-namespace
    ports:
    - protocol: TCP
      port: 5432