apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-api
  namespace: workflow-namespace
  labels:
    app: workflow-api
    managed-by: nitroberry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: workflow-api
  template:
    metadata:
      labels:
        app: workflow-api
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: workflow-api
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: workflow-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: 798701233691.dkr.ecr.ap-south-1.amazonaws.com/nitroberry/workflow-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: workflow-api-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: workflow-api-secrets
                  key: database-url
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
        - name: worker
          image: 798701233691.dkr.ecr.ap-south-1.amazonaws.com/nitroberry/workflow-worker:latest
          envFrom:
            - configMapRef:
                name: workflow-api-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: workflow-api-secrets
                  key: database-url
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-api-service
  namespace: workflow-namespace
spec:
  selector:
    app: workflow-api
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workflow-api-hpa
  namespace: workflow-namespace
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workflow-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: workflow-api-websecure
  namespace: workflow-namespace
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`workflow.nitroberry.com`) && (PathPrefix(`/health`) || PathPrefix(`/public`))
      kind: Rule
      services:
        - name: workflow-api-service
          port: 8080
      middlewares:
        - name: rate-limit
          namespace: traefik-ingress
        - name: security-headers
          namespace: traefik-ingress
    - match: Host(`workflow.nitroberry.com`)
      kind: Rule
      services:
        - name: workflow-api-service
          port: 8080
      middlewares:
        - name: jwt-auth
          namespace: traefik-ingress
        - name: rate-limit
          namespace: traefik-ingress
        - name: security-headers
          namespace: traefik-ingress
  tls:
    certResolver: myresolver
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: workflow-api-policy
  namespace: workflow-namespace
spec:
  podSelector:
    matchLabels:
      app: workflow-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik-ingress
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: database-namespace
    ports:
    - protocol: TCP
      port: 5432