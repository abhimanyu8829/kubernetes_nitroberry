# --- Database credentials ---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: database-namespace
  labels:
    managed-by: nitroberry
    secret-type: database
type: Opaque
stringData:
  postgres-password: "REPLACE_WITH_STRONG_PASSWORD"
  postgres-user: "postgres"

# --- Auth API secrets ---
apiVersion: v1
kind: Secret
metadata:
  name: auth-api-secrets
  namespace: auth-namespace
  labels:
    app: auth-api
    managed-by: nitroberry
    secret-type: app
type: Opaque
stringData:
  db-password: "REPLACE_WITH_STRONG_PASSWORD"
  jwt-secret: "REPLACE_WITH_RANDOM_256BIT_SECRET"
  database-url: "postgres://postgres:REPLACE_WITH_STRONG_PASSWORD@postgres-service.database-namespace.svc.cluster.local:5432/postgres?options=-csearch_path%3Dauth"

