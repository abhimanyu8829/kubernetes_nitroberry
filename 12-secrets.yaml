# --- AWS S3 credentials for database backup ---
apiVersion: v1
kind: Secret
metadata:
  name: aws-s3-backup-credentials
  namespace: database-namespace
  labels:
    managed-by: nitroberry
    secret-type: backup
type: Opaque
stringData:
  AWS_ACCESS_KEY_ID: "REPLACE_WITH_AWS_ACCESS_KEY"       # seal this
  AWS_SECRET_ACCESS_KEY: "REPLACE_WITH_AWS_SECRET_KEY"   # seal this
  AWS_DEFAULT_REGION: "us-east-1"                        # change to your region
  S3_BUCKET: "nitroberry-db-backups"                     # change to your bucket

---
