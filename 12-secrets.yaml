# =============================================================
# 12-secrets.yaml
# Kubernetes Secrets + SealedSecrets workflow.
#
# WORKFLOW:
#   1. Install Sealed Secrets controller (one-time):
#      kubectl apply -f https://github.com/bitnami-labs/sealed-secrets/releases/latest/download/controller.yaml
#
#   2. Install kubeseal CLI:
#      brew install kubeseal  (mac)
#      wget https://github.com/bitnami-labs/sealed-secrets/releases/latest/download/kubeseal-linux-amd64
#
#   3. Create a plain Secret, then seal it:
#      kubectl create secret generic postgres-credentials \
#        --namespace=database-namespace \
#        --from-literal=postgres-password='YourSecurePass123!' \
#        --dry-run=client -o yaml | \
#        kubeseal --format yaml > sealed-postgres-credentials.yaml
#
#   4. Apply the SealedSecret (safe to commit to git):
#      kubectl apply -f sealed-postgres-credentials.yaml
#
#   The controller decrypts it into a real Secret automatically.
#
# NOTE: The plain Secrets below are for INITIAL SETUP / LOCAL DEV only.
#       In production, replace each with its SealedSecret equivalent.
# =============================================================

# --- Database credentials (shared, referenced by all APIs) ---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: database-namespace
  labels:
    managed-by: nitroberry
    secret-type: database
type: Opaque
stringData:
  postgres-password: "REPLACE_WITH_STRONG_PASSWORD"   # seal this
  postgres-user: "postgres"

---
# --- Auth API secrets ---
apiVersion: v1
kind: Secret
metadata:
  name: auth-api-secrets
  namespace: auth-namespace
  labels:
    app: auth-api
    managed-by: nitroberry
    secret-type: app
type: Opaque
stringData:
  db-password: "REPLACE_WITH_STRONG_PASSWORD"         # seal this
  jwt-secret: "REPLACE_WITH_RANDOM_256BIT_SECRET"     # seal this
  database-url: "postgres://postgres:REPLACE_WITH_STRONG_PASSWORD@postgres-service.database-namespace.svc.cluster.local:5432/postgres?options=-csearch_path%3Dauth"

