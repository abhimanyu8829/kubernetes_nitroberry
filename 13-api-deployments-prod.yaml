# =============================================================
# 13-api-deployments-prod.yaml
# Production-grade replacements for 06-10 API deployments.
#
# Changes vs original:
#   - env vars sourced from ConfigMap (non-sensitive) + Secret (sensitive)
#   - DATABASE_URL built from secret, not hardcoded
#   - podAntiAffinity: spreads pods across 2 nodes
#   - topologySpreadConstraints: even distribution
#   - resource requests + limits (required for HPA + OPA)
#   - readiness + liveness probes
#   - securityContext: non-root, read-only filesystem
# =============================================================

# ── auth-api ──────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
  namespace: auth-namespace
  labels:
    app: auth-api
    managed-by: nitroberry
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-api
  template:
    metadata:
      labels:
        app: auth-api
    spec:
      # Spread pods across 2 nodes — never 2 pods on same node
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: auth-api
              topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: auth-api
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: yourregistry.com/auth-api:v1.0.0
          ports:
            - containerPort: 8080
          # Non-sensitive config from ConfigMap
          envFrom:
            - configMapRef:
                name: auth-api-config
          # Sensitive values from Secret
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: auth-api-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-api-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

