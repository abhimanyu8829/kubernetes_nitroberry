apiVersion: v1
kind: ConfigMap
metadata:
  name: auth-api-config
  namespace: auth-namespace
  labels:
    app: auth-api
    managed-by: nitroberry
data:
  PORT: "8080"
  DB_SCHEMA: "auth"
  DB_HOST: "postgres-service.database-namespace.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "postgres"
  DB_USER: "postgres"
  JWT_ALGORITHM: "HS256"
  LOG_LEVEL: "info"
  ENV: "production"
  WORKER_ENABLED: "true"
---
