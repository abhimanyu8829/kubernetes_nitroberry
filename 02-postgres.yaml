apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: database-namespace
type: Opaque
stringData:
  postgres-password: "nitroberry-secret-password"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
  namespace: database-namespace
data:
  init.sql: |
    CREATE SCHEMA IF NOT EXISTS auth;
    CREATE SCHEMA IF NOT EXISTS cockpit;
    CREATE SCHEMA IF NOT EXISTS messenger;
    CREATE SCHEMA IF NOT EXISTS social;
    CREATE SCHEMA IF NOT EXISTS task;
    CREATE SCHEMA IF NOT EXISTS vault;
    CREATE SCHEMA IF NOT EXISTS workflow;
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: database-namespace
spec:
  serviceName: "postgres-service"
  replicas: 2
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: postgres-password
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        - name: init-script
          mountPath: /docker-entrypoint-initdb.d
      volumes:
      - name: init-script
        configMap:
          name: postgres-init-script
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: database-namespace
spec:
  selector:
    app: postgres
  ports:
  - protocol: TCP
    port: 5432
    targetPort: 5432
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-access
  namespace: database-namespace
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: auth-namespace
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cockpit-namespace
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: messenger-namespace
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: social-namespace
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: task-namespace
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: vault-namespace
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: workflow-namespace
    ports:
    - protocol: TCP
      port: 5432